<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The End</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

/* credits container */

.credits{
position:absolute;
bottom:-120%;
width:100%;
text-align:center;
animation:scrollCredits 38s linear forwards;
padding-bottom:200px;
}

/* headings */

h1{
font-family:'Playfair Display',serif;
margin-bottom:40px;
font-size:36px;
}

/* lines */

p{
margin:18px 0;
font-size:18px;
}

/* strike joke */

.strike{
text-decoration:line-through;
opacity:0.6;
}

/* ending line */

.end{
margin-top:90px;
font-size:24px;
font-family:'Playfair Display',serif;
}

/* final note */

.final-note{
margin-top:20px;
font-size:16px;
opacity:0.7;
}

/* scroll animation */

@keyframes scrollCredits{

0%{
bottom:-120%;
}

100%{
bottom:120%;
}

}

</style>
</head>
