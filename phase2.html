<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Things I’ve Noticed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ============================= */
/* BASE */
/* ============================= */

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#ffffff,#f5ebe6);
color:#3e2723;
overflow:hidden;
}

/* ============================= */
/* SWIPE SECTION */
/* ============================= */

.swipe-wrapper{
position:relative;
height:100vh;
overflow:hidden;
}

.swipe-container{
display:flex;
width:400vw;
height:100vh;
transition:transform 0.7s ease;
}

.panel{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
font-family:'Playfair Display',serif;
font-size:38px;
position:relative;
}

.tap-indicator{
position:absolute;
bottom:40px;
font-family:'Poppins',sans-serif;
font-size:14px;
opacity:0.6;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* ============================= */
/* CHOCOLATE SECTION */
/* ============================= */

.choco-section{
display:none;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
animation:fadeIn 1.2s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.choco-section h2{
font-family:'Playfair Display',serif;
margin-bottom:25px;
font-size:34px;
}

.choco-grid{
display:grid;
grid-template-columns:repeat(3,80px);
gap:25px;
margin-bottom:30px;
}

.choco{
font-size:50px;
cursor:pointer;
transition:transform 0.3s ease;
}

.choco.eaten{
opacity:0.35;
transform:scale(0.85);
pointer-events:none;
filter:grayscale(40%);
}

.choco:hover{
transform:scale(1.15);
}

.reveal{
max-width:520px;
min-height:90px;
font-size:18px;
text-align:center;
line-height:1.6;
}

.next-btn{
margin-top:40px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#5d4037;
color:white;
cursor:pointer;
transition:0.3s;
}

.next-btn:disabled{
opacity:0.4;
cursor:not-allowed;
transform:none;
}
.next-btn:hover{
transform:scale(1.05);
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.confetti-piece{
position:absolute;
width:8px;
height:8px;
background:#5d4037;
opacity:0.8;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>
<div id="confetti"></div>
<!-- ============================= -->
<!-- SWIPE PANELS -->
<!-- ============================= -->

<div class="swipe-wrapper">
<div class="swipe-container" id="swipe">

<div class="panel">
Before we go further…
<div class="tap-indicator">Tap to continue →</div>
</div>

<div class="panel">
There are a few things I’ve noticed.
<div class="tap-indicator">Tap to continue →</div>
</div>

<div class="panel">
Nothing dramatic.
<div class="tap-indicator">Tap to continue →</div>
</div>

<div class="panel">
Just things that matter.
<div class="tap-indicator">Tap to continue →</div>
</div>

</div>
</div>

<!-- ============================= -->
<!-- CHOCOLATE SECTION -->
<!-- ============================= -->

<div class="choco-section" id="chocoSection">

<h2>Things I’ve Noticed.</h2>

<div class="choco-grid">

<!-- ===== 6 CHOCOLATES (ACTIVE DEFAULT) ===== -->
<div id="choco0" class="choco" onclick="revealText(0)">🍫</div>
<div id="choco1" class="choco" onclick="revealText(1)">🍫</div>
<div id="choco2" class="choco" onclick="revealText(2)">🍫</div>
<div id="choco3" class="choco" onclick="revealText(3)">🍫</div>
<div id="choco4" class="choco" onclick="revealText(4)">🍫</div>
<div id="choco5" class="choco" onclick="revealText(5)">🍫</div>

<!-- ===== 8 CHOCOLATES (COMMENTED OPTION) ===== -->
<!--
<div class="choco" onclick="revealText(0)">🍫</div>
<div class="choco" onclick="revealText(1)">🍫</div>
<div class="choco" onclick="revealText(2)">🍫</div>
<div class="choco" onclick="revealText(3)">🍫</div>
<div class="choco" onclick="revealText(4)">🍫</div>
<div class="choco" onclick="revealText(5)">🍫</div>
<div class="choco" onclick="revealText(6)">🍫</div>
<div class="choco" onclick="revealText(7)">🍫</div>
-->

</div>

<div class="reveal" id="revealText"></div>
<div id="completionMessage"></div>

<button id="nextBtn" class="next-btn" onclick="goNext()" disabled>
Continue
</button>
</div>

<script>

let chocolatesOpened = 0;
const totalChocolates = 6;
/* ============================= */
/* CONFIG – PUT YOUR WEB APP URL HERE */
/* ============================= */

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbziV90ORoVyBuwRsgnhnrPtrqadseWM5B2VGqKwOUR1H_KcYKXsBJEfwWzDyAwkxh4g/exec";


/* ============================= */
/* SWIPE LOGIC */
/* ============================= */

let currentPanel=0;
const swipe=document.getElementById("swipe");

function nextPanel(){
currentPanel++;
if(currentPanel<4){
swipe.style.transform="translateX(-"+(currentPanel*100)+"vw)";
}else{
document.querySelector(".swipe-wrapper").style.display="none";
document.getElementById("chocoSection").style.display="flex";
}
}

document.body.addEventListener("click",function(e){
if(e.target.closest(".panel")){
nextPanel();
}
});

/* ============================= */
/* TEXT CONTENT */
/* ============================= */

const chocolates = [

    {
    text: "You care more deeply than you let people see.",
    options: [
        { label: "Maybe I do.", reaction: "I know you do." },
        { label: "Not really.", reaction: "You hide it well then." }
    ]
    },

    {
    text: "You value consistency more than big gestures.",
    options: [
        { label: "Consistency matters.", reaction: "Exactly." },
        { label: "Big gestures are nice too.", reaction: "Only when they’re real." }
    ]
    },

    {
    text: "You notice effort, even when you don’t say it.",
    options: [
        { label: "I notice everything.", reaction: "I’m aware." },
        { label: "I don’t pay attention.", reaction: "That’s not true." }
    ]
    },

    {
    text: "You don’t open up to everyone.",
    options: [
        { label: "I’m selective.", reaction: "That’s a strength." },
        { label: "I’m open.", reaction: "Only when it feels safe." }
    ]
    },

    {
    text: "You are more important than you think.",
    options: [
        { label: "I don’t see it.", reaction: "One day you will." },
        { label: "Maybe I am.", reaction: "I thought so." }
    ]
    },

    {
    text: "You don’t feel temporary.",
    options: [
        { label: "What does that mean?", reaction: "It means you stay." },
        { label: "That’s heavy.", reaction: "Only slightly." }
    ]
    }

];
/* ============================= */
/* TYPEWRITER + RESPONSE SYSTEM */
/* ============================= */

function revealText(index){

const choco = document.getElementById("choco"+index);

if(!choco.classList.contains("eaten")){
    choco.classList.add("eaten");
    chocolatesOpened++;
}

checkCompletion();

const container=document.getElementById("revealText");
container.innerHTML="";

let text=chocolates[index].text;
let i=0;

function type(){
if(i<text.length){
container.innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}else{
showOptions(index);
}
}

type();
}

/* ============================= */
/* SHOW RESPONSE BUTTONS */
/* ============================= */

function showOptions(index){

const container=document.getElementById("revealText");

const optionsDiv=document.createElement("div");
optionsDiv.style.marginTop="20px";

const option1=chocolates[index].options[0];
const option2=chocolates[index].options[1];

const btn1=document.createElement("button");
btn1.innerText=option1.label;
btn1.className="next-btn";
btn1.style.marginRight="10px";

const btn2=document.createElement("button");
btn2.innerText=option2.label;
btn2.className="next-btn";

btn1.onclick=function(){
handleResponse(index,option1.label,option1.reaction);
};

btn2.onclick=function(){
handleResponse(index,option2.label,option2.reaction);
};

optionsDiv.appendChild(btn1);
optionsDiv.appendChild(btn2);

container.appendChild(optionsDiv);
}

/* ============================= */
/* HANDLE RESPONSE */
/* ============================= */

function handleResponse(index,choice,reaction){

const container=document.getElementById("revealText");

container.innerHTML += "<br><br><em>"+reaction+"</em>";
container.innerHTML += "<br><br><strong>Noted.</strong>";

sendToSheet(
index,
chocolates[index].text,
choice
);

}

/* ============================= */
/* SEND DATA TO GOOGLE SHEET */
/* ============================= */

function sendToSheet(index,text,choice){

fetch(WEB_APP_URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
index:index,
text:text,
choice:choice
})
});

}

/* ============================= */
/* NEXT PHASE */
/* ============================= */

function goNext(){
window.location.href="phase3.html";
}
function checkCompletion(){

const btn = document.getElementById("nextBtn");

if(chocolatesOpened === totalChocolates){

btn.disabled = false;
btn.innerText = "Continue";

celebrateCompletion();

}else{

btn.innerText = "Finish the chocolates first";

}

}

checkCompletion();

function celebrateCompletion(){

const message = document.getElementById("completionMessage");

message.innerHTML = "<br><strong>Nice. You finished them.</strong>";

for(let i=0;i<40;i++){

const piece=document.createElement("div");
piece.className="confetti-piece";

piece.style.left=Math.random()*100+"vw";
piece.style.background=["#5d4037","#8d6e63","#d7ccc8"][Math.floor(Math.random()*3)];

piece.style.animationDuration=(2+Math.random()*2)+"s";

document.getElementById("confetti").appendChild(piece);

setTimeout(()=>piece.remove(),3000);

}

}

</script>

</body>
</html>
